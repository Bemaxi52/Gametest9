<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BEMAXI CLICKER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00ffcc;
  --accent2: #ff00aa;
  --bg: #080808;
  --bg2: #0c0c0c;
  --border: rgba(255,255,255,0.08);
  --font-display: "Orbitron", monospace;
  --font-body: "Rajdhani", sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  height: 100vh; overflow: hidden;
  background: var(--bg); color: #e8e8e8;
  font-family: var(--font-body); user-select: none;
}
button, .s-card, .click-btn, .exit-btn { cursor: pointer; }

/* Кастомный курсор — скрыт */
.cursor-fx { display: none; }

/* Статус-бар */
.status-bar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(8,8,8,0.97); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px;
}
.exit-btn {
  padding:6px 14px; background:rgba(255,0,170,0.08);
  border:1px solid var(--accent2); color:var(--accent2);
  font-family:var(--font-display); font-size:0.55rem;
  border-radius:4px; transition:0.2s;
}
.exit-btn:hover { background:var(--accent2); color:#fff; }
.bal-block { display:flex; align-items:baseline; gap:6px; }
.bal-num {
  font-family:var(--font-display); font-size:1.4rem; font-weight:900;
  color:var(--accent); text-shadow:0 0 20px rgba(0,255,204,0.4);
  transition:transform 0.1s;
}
.bal-num.bump { transform:scale(1.08); }
.bal-label { font-size:0.85rem; color:rgba(0,255,204,0.5); font-family:var(--font-display); }
.cps-badge {
  font-family:var(--font-display); font-size:0.55rem;
  color:rgba(0,255,204,0.6); border:1px solid rgba(0,255,204,0.2);
  padding:4px 10px; border-radius:20px;
}

/* Сетка */
.shell {
  display:grid;
  grid-template-rows: 1fr auto 165px;
  height:100vh; padding-top:56px;
}

/* Анимированный фон */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* Зона врага */
.game-area {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 50%, rgba(0,255,204,0.06) 0%, transparent 70%);
  position:relative; overflow:hidden;
}
.game-area::before {
  content:''; position:absolute; inset:0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
  pointer-events:none;
  z-index:1;
}
.enemy-wrapper { position: relative; z-index: 2; }

.enemy-wrapper { position:relative; display:flex; flex-direction:column; align-items:center; gap:12px; }

.enemy-name-tag {
  font-family:var(--font-display); font-size:0.65rem; letter-spacing:0.18em;
  color:var(--accent); text-shadow:0 0 12px var(--accent);
  text-transform:uppercase;
}

.enemy-img {
  width: min(320px, 42vw); height: min(320px, 42vw);
  object-fit:cover; object-position:top;
  border-radius:22px;
  border:2px solid rgba(0,255,204,0.25);
  box-shadow:0 0 40px rgba(0,255,204,0.15), inset 0 0 30px rgba(0,0,0,0.5);
  transition:transform 0.08s, box-shadow 0.15s, filter 0.3s;
  display:block;
}
.enemy-img.hit {
  transform:scale(0.95) rotate(-1.5deg);
  box-shadow:0 0 60px rgba(255,0,170,0.6);
  border-color:var(--accent2);
}
.enemy-img.dead { filter:grayscale(1) brightness(0.3); transform:scale(0.85); }

.hp-wrapper { width: min(320px, 42vw); }
.hp-bar-bg { width:100%; height:14px; background:#111; border-radius:20px; overflow:hidden; border:1px solid var(--border); }
.hp-bar-fill {
  height:100%;
  background:linear-gradient(90deg, var(--accent), #00cc88);
  transition:width 0.2s ease, background 0.3s;
  border-radius:20px; box-shadow:0 0 10px rgba(0,255,204,0.4);
}
.hp-bar-fill.danger { background:linear-gradient(90deg, #ff4444, #ff6600); box-shadow:0 0 10px rgba(255,68,68,0.4); }
.hp-stats { font-family:var(--font-display); font-size:0.6rem; color:rgba(0,255,204,0.7); text-align:center; margin-top:8px; }

/* Зона клика — БОЛЬШАЯ кнопка */
.click-zone {
  display:flex; justify-content:center; align-items:center;
  padding:6px 0;
  background:linear-gradient(to top, var(--bg2) 60%, transparent);
}
.click-btn {
  position:relative;
  width: min(200px, 28vw); height: min(200px, 28vw);
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,255,204,0.12), rgba(0,255,204,0.02));
  border:3px solid var(--accent);
  box-shadow:0 0 40px rgba(0,255,204,0.25), inset 0 0 40px rgba(0,255,204,0.06);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  transition:transform 0.08s, box-shadow 0.08s;
  overflow:hidden;
}
.click-btn::before {
  content:''; position:absolute; inset:-3px; border-radius:50%;
  background:conic-gradient(rgba(0,255,204,0.35) var(--progress, 0%), transparent 0%);
  mask:radial-gradient(circle, transparent 62%, black 63%);
  -webkit-mask:radial-gradient(circle, transparent 62%, black 63%);
}
.click-btn:active {
  transform:scale(0.87);
  box-shadow:0 0 80px rgba(0,255,204,0.6), inset 0 0 40px rgba(0,255,204,0.2);
}
.click-btn-icon {
  font-size: clamp(2.8rem, 5vw, 4.4rem);
  color:var(--accent);
  font-family:var(--font-display); font-weight:900;
  text-shadow:0 0 25px var(--accent);
  transition:transform 0.08s; line-height:1;
}
.click-btn:active .click-btn-icon { transform:scale(1.2); }
.click-power-label {
  font-family:var(--font-display); font-size:0.44rem;
  color:rgba(0,255,204,0.45); letter-spacing:0.08em;
  position:relative; z-index:1;
}

/* Магазин */
.shop-panel { background:var(--bg2); border-top:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.shop-title { font-family:var(--font-display); font-size:0.5rem; color:rgba(255,255,255,0.2); letter-spacing:0.2em; padding:6px 14px 3px; text-transform:uppercase; }
.shop-scroll {
  flex:1; overflow-y:auto; padding:4px 8px 8px;
  display:flex; flex-direction:column;
  gap:5px;
  scrollbar-width:thin; scrollbar-color:rgba(0,255,204,0.2) transparent;
}
.s-card {
  background:rgba(255,255,255,0.025); border-radius:10px; padding:7px 12px;
  display:flex; align-items:center; gap:10px;
  border:1px solid var(--border);
  transition:background 0.15s, border-color 0.15s, transform 0.1s;
  width:100%;
}
.s-card:hover { background:rgba(0,255,204,0.05); border-color:rgba(0,255,204,0.25); }
.s-card:active { transform:scale(0.99); }
.s-card.cant-afford { opacity:0.35; pointer-events:none; }
.s-icon { font-size:1.3rem; line-height:1; flex-shrink:0; }
.s-info { flex:1; min-width:0; }
.s-name { font-family:var(--font-display); font-size:0.52rem; color:#ddd; letter-spacing:0.04em; }
.s-desc { font-size:0.62rem; color:rgba(255,255,255,0.3); line-height:1.2; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.price-tag { font-family:var(--font-display); font-size:0.62rem; color:var(--accent); white-space:nowrap; text-align:right; }
.price-inc { font-size:0.55rem; color:rgba(0,255,204,0.4); text-align:right; margin-top:1px; }

/* Кликабельные объекты на фоне */
.bg-object {
  position: fixed;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: none;
  pointer-events: all;
  animation: obj-appear 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
  filter: drop-shadow(0 0 8px currentColor);
  transition: transform 0.1s;
}
.bg-object:hover { transform: scale(1.25) !important; }
.bg-object:active { transform: scale(0.9) !important; }
.bg-object-icon {
  font-size: 2rem;
  line-height: 1;
  animation: obj-bob 2s ease-in-out infinite;
}
.bg-object-label {
  font-family: var(--font-display);
  font-size: 0.4rem;
  letter-spacing: 0.06em;
  opacity: 0.8;
  white-space: nowrap;
}
.bg-object.rare .bg-object-icon { animation: obj-spin 1.5s linear infinite; font-size: 2.4rem; }
.bg-object.collected {
  pointer-events: none;
  animation: obj-collect 0.35s ease forwards;
}
@keyframes obj-appear {
  0%   { opacity:0; transform:scale(0) rotate(-30deg); }
  100% { opacity:1; transform:scale(1) rotate(0deg); }
}
@keyframes obj-bob {
  0%,100% { transform:translateY(0); }
  50%     { transform:translateY(-7px); }
}
@keyframes obj-spin {
  0%   { transform:rotate(0deg) scale(1); }
  50%  { transform:rotate(180deg) scale(1.1); }
  100% { transform:rotate(360deg) scale(1); }
}
@keyframes obj-collect {
  0%   { opacity:1; transform:scale(1); }
  40%  { opacity:0.8; transform:scale(1.5) rotate(15deg); }
  100% { opacity:0; transform:scale(0.2) rotate(45deg); }
}
@keyframes obj-timeout {
  0%   { opacity:1; }
  70%  { opacity:1; }
  100% { opacity:0; transform:scale(0.5); }
}

/* Плавающие числа */
.float-num {
  position:fixed; pointer-events:none; z-index:1000;
  font-family:var(--font-display); font-weight:900; font-size:1rem;
  color:var(--accent); text-shadow:0 0 10px var(--accent);
  animation:float-up 0.85s cubic-bezier(0.2,1,0.4,1) forwards;
}
.float-num.big { font-size:1.4rem; color:var(--accent2); text-shadow:0 0 10px var(--accent2); }
@keyframes float-up {
  0%   { opacity:1; transform:translate(-50%,-50%) translateY(0) scale(1); }
  40%  { opacity:1; transform:translate(-50%,-50%) translateY(-40px) scale(1.1); }
  100% { opacity:0; transform:translate(-50%,-50%) translateY(-90px) scale(0.8); }
}
@keyframes particle-fall {
  0%   { transform:translateY(0) rotate(0deg); opacity:0.9; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* Баннер убийства */
.enemy-kill-banner {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
  background:rgba(0,255,204,0.08); border:2px solid var(--accent);
  border-radius:16px; padding:18px 36px; z-index:500;
  font-family:var(--font-display); text-align:center;
  backdrop-filter:blur(20px);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  opacity:0;
}
.enemy-kill-banner.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
.banner-title { font-size:0.55rem; color:rgba(0,255,204,0.6); letter-spacing:0.2em; margin-bottom:6px; }
.banner-name { font-size:1.1rem; color:var(--accent); text-shadow:0 0 20px var(--accent); }

/* Экран победы */
.win-screen {
  position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,0.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  opacity:0; pointer-events:none;
  transition:opacity 0.8s ease;
  backdrop-filter:blur(10px);
}
.win-screen.show { opacity:1; pointer-events:all; }
.win-particles { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.win-title {
  font-family:var(--font-display); font-size:2rem; font-weight:900;
  color:var(--accent); text-shadow:0 0 40px var(--accent), 0 0 80px var(--accent);
  animation:pulse-glow 1.5s ease-in-out infinite;
  text-align:center; letter-spacing:0.1em;
}
@keyframes pulse-glow {
  0%,100% { text-shadow:0 0 30px var(--accent), 0 0 60px var(--accent); }
  50%      { text-shadow:0 0 60px var(--accent), 0 0 120px var(--accent), 0 0 10px #fff; }
}
.win-sub {
  font-family:var(--font-display); font-size:0.6rem; color:rgba(255,255,255,0.4);
  letter-spacing:0.2em; text-align:center;
}
.win-money {
  font-family:var(--font-display); font-size:1.1rem; font-weight:700;
  color:var(--accent2); text-shadow:0 0 20px var(--accent2);
}
.win-btn {
  margin-top:10px; padding:14px 40px;
  background:rgba(0,255,204,0.1); border:2px solid var(--accent);
  color:var(--accent); font-family:var(--font-display); font-size:0.7rem;
  border-radius:8px; transition:0.2s; letter-spacing:0.1em;
}
.win-btn:hover { background:var(--accent); color:#000; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="cursor-fx" id="cursor-fx"></div>

<!-- Экран победы -->
<div class="win-screen" id="win-screen">
  <div class="win-particles" id="win-particles"></div>
  <div class="win-title">ПОБЕДА!</div>
  <div class="win-sub">МММ УНИЧТОЖЕН · СИСТЕМА РУХНУЛА</div>
  <div class="win-money" id="win-money">0 ₽ ЗАРАБОТАНО</div>
  <button class="win-btn" onclick="parent.closeClickerModal ? parent.closeClickerModal() : location.reload()">← ВЫЙТИ</button>
</div>

<div class="enemy-kill-banner" id="kill-banner">
  <div class="banner-title">ЦЕЛЬ УНИЧТОЖЕНА</div>
  <div class="banner-name" id="banner-name">MELLSTROY</div>
</div>

<div class="status-bar">
  <button class="exit-btn" onclick="parent.closeClickerModal ? parent.closeClickerModal() : history.back()">← ВЫХОД</button>
  <div class="bal-block">
    <div class="bal-num" id="balance">0</div>
    <div class="bal-label">₽</div>
  </div>
  <div class="cps-badge" id="cps-badge">0 ₽/с</div>
</div>

<div class="shell">
  <div class="game-area">
    <div class="enemy-wrapper">
      <div class="enemy-name-tag" id="enemy-name-tag">ASKHAB TAMAEV</div>
      <img src="" class="enemy-img" id="enemy-img" draggable="false">
      <div class="hp-wrapper">
        <div class="hp-bar-bg"><div class="hp-bar-fill" id="enemy-fill"></div></div>
        <div class="hp-stats"><span id="cur-hp">0</span> / <span id="max-hp">0</span> ₽</div>
      </div>
    </div>
  </div>

  <div class="click-zone">
    <button class="click-btn" id="click-btn" onclick="handleClick(event)">
      <span class="click-btn-icon">₽</span>
      <span class="click-power-label" id="click-power-label">+1 ЗА КЛИК</span>
    </button>
  </div>

  <div class="shop-panel">
    <div class="shop-title">УЛУЧШЕНИЯ</div>
    <div class="shop-scroll" id="shop-container"></div>
  </div>
</div>

<script>
const MOB = window.matchMedia('(pointer: coarse)').matches;

// ─── Кастомный курсор (только десктоп) ──────────────────────────────
const cursorEl = document.getElementById('cursor-fx');
if (MOB) {
  cursorEl.style.display = 'none';
} else {
  document.addEventListener('mousemove', e => {
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
  document.addEventListener('mouseup',   () => cursorEl.classList.remove('clicking'));
}

// Touch на кнопке клика — без задержки 300мс
if (MOB) {
  document.getElementById('click-btn').addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    handleClick({ clientX: t.clientX, clientY: t.clientY });
  }, { passive: false });
}

// ─── Web Audio — звук клика ───────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClickSound() {
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(260, audioCtx.currentTime + 0.07);
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.13);
  } catch(e) {}
}

function playKillSound() {
  try {
    [0, 0.12, 0.24].forEach((delay, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square';
      const freqs = [440, 554, 659];
      osc.frequency.setValueAtTime(freqs[i], audioCtx.currentTime + delay);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.2);
      osc.start(audioCtx.currentTime + delay);
      osc.stop(audioCtx.currentTime + delay + 0.22);
    });
  } catch(e) {}
}

function playWinSound() {
  try {
    const notes = [261, 329, 392, 523, 659, 784];
    notes.forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + i * 0.1;
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.45);
    });
  } catch(e) {}
}

// Разблокировка AudioContext
document.addEventListener('click',      () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
document.addEventListener('touchstart', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });

const ENEMIES = [
  { imgNormal:'askhab_normal.jpg', imgHurt:'askhab_hurt.jpg',  imgSwapAt:0.50, name:'ASKHAB TAMAEV', price:15000,   soundNormal:'askhab_normal.mp3', soundHurt:'askhab_hurt.mp3' },
  { imgNormal:'mell_normal.jpg',   imgHurt:'mell_hurt.jpg',    imgSwapAt:0.50, name:'MELLSTROY',     price:120000,  soundNormal:'mell_normal.mp3',   soundHurt:'mell_hurt.mp3'   },
  { imgNormal:'mavrodi_normal.jpg',imgHurt:'mavrodi_hurt.jpg', imgSwapAt:0.50, name:'МММ',           price:1500000, soundNormal:'mavrodi_normal.mp3',soundHurt:'mavrodi_hurt.mp3'},
];

// Предзагрузка аудио
const audioCache = {};
function getAudio(src) {
  if (!audioCache[src]) { audioCache[src] = new Audio(src); audioCache[src].preload = 'auto'; }
  return audioCache[src];
}
ENEMIES.forEach(e => { getAudio(e.soundNormal); getAudio(e.soundHurt); });

let G = {
  money: 0, clickPower: 1,
  enemyIndex: 0, enemyValue: ENEMIES[0].price, enemyMax: ENEMIES[0].price,
  gameOver: false,
  items: {
    i1:  { name:'Студент',        desc:'⚡ +2 за клик · копейки пассивно',        price:20,      inc:1,      count:0, icon:'👨‍💻', clickBonus:2    },
    i2:  { name:'Бот-сеть',       desc:'⚡ +5 за клик · авто-тапы 24/7',          price:200,     inc:5,      count:0, icon:'🤖',  clickBonus:5    },
    i3:  { name:'Майнер',         desc:'⚡ +15 за клик · добыча на GPU',           price:1000,    inc:20,     count:0, icon:'⛏️',  clickBonus:15   },
    i4:  { name:'Серверная',      desc:'⚡ +40 за клик · дата-центр на тебя',      price:5000,    inc:80,     count:0, icon:'🖥️',  clickBonus:40   },
    i5:  { name:'Крипто-кошелёк', desc:'⚡ +100 за клик · волатильность = профит', price:15000,   inc:200,    count:0, icon:'💰',  clickBonus:100  },
    i6:  { name:'ИИ-торговец',    desc:'⚡ +250 за клик · алго бьёт рынок',        price:50000,   inc:600,    count:0, icon:'🧠',  clickBonus:250  },
    i7:  { name:'Офшор',          desc:'⚡ +600 за клик · деньги где тепло',        price:160000,  inc:2000,   count:0, icon:'🏝️',  clickBonus:600  },
    i8:  { name:'Медиа-империя',  desc:'⚡ +1500 за клик · подписчики платят',      price:550000,  inc:7000,   count:0, icon:'📺',  clickBonus:1500 },
    i9:  { name:'Пирамида МММ',   desc:'⚡ +4000 за клик · работает пока работает', price:1800000, inc:25000,  count:0, icon:'🔺',  clickBonus:4000 },
    i10: { name:'Центробанк',     desc:'⚡ +10000 за клик · просто печатай',        price:7000000, inc:100000, count:0, icon:'🏦',  clickBonus:10000},
  }
};

// Инициализируем первого врага
document.getElementById('enemy-img').src = ENEMIES[0].imgNormal;
document.getElementById('enemy-name-tag').textContent = ENEMIES[0].name;

// Звуки и картинки по порогам (80% и 40%)
let sf = { s1: false, s2: false, img: false };
function stopEnemySounds() {
  ENEMIES.forEach(e => [e.soundNormal, e.soundHurt].forEach(s => {
    if (audioCache[s]) { audioCache[s].pause(); audioCache[s].currentTime = 0; }
  }));
}
function playOneShot(src) {
  if (!src) return;
  stopEnemySounds();
  const a = getAudio(src); a.loop = false; a.currentTime = 0; a.play().catch(() => {});
}
function switchEnemyImg(enemy) {
  const img = document.getElementById('enemy-img');
  img.style.filter = 'brightness(3) saturate(0)';
  img.style.transform = 'scale(1.06) rotate(-2deg)';
  setTimeout(() => {
    img.src = enemy.imgHurt;
    img.style.filter = img.style.transform = '';
    img.style.borderColor = 'rgba(255,40,40,0.9)';
    img.style.boxShadow = '0 0 50px rgba(255,0,0,0.6)';
  }, 180);
}
function checkSoundThresholds() {
  const e = ENEMIES[G.enemyIndex]; if (!e || G.gameOver) return;
  const p = G.enemyValue / G.enemyMax;
  if (!sf.s1  && p <= 0.80) { sf.s1  = true; playOneShot(e.soundNormal); }
  if (!sf.s2  && p <= 0.40) { sf.s2  = true; playOneShot(e.soundHurt);   }
  if (!sf.img && p <= (e.imgSwapAt || 0.50)) { sf.img = true; switchEnemyImg(e); }
}

function handleClick(e) {
  if (G.gameOver) return;
  audioCtx.resume();
  playClickSound();
  G.money      += G.clickPower;
  G.enemyValue -= G.clickPower;
  const img = document.getElementById('enemy-img');
  img.classList.add('hit');
  setTimeout(() => img.classList.remove('hit'), 120);
  spawnFloat(e.clientX, e.clientY, `+${G.clickPower} ₽`, false);
  checkSoundThresholds();
  if (G.enemyValue <= 0) nextEnemy();
  updateUI();
}

let killingInProgress = false;
function nextEnemy() {
  if (killingInProgress) return;
  killingInProgress = true;
  const killed = ENEMIES[G.enemyIndex] || {};
  const isLast = G.enemyIndex === ENEMIES.length - 1;

  playKillSound();
  showKillBanner(killed.name || 'ЦЕЛЬ');

  const img = document.getElementById('enemy-img');
  img.classList.add('dead');

  setTimeout(() => {
    if (isLast) {
      // Финальная победа
      G.gameOver = true;
      showWinScreen();
      return;
    }
    G.enemyIndex++;
    const next = ENEMIES[G.enemyIndex];
    G.enemyMax   = next.price;
    G.enemyValue = next.price;
    img.src      = next.imgNormal;
    img.style.borderColor = img.style.boxShadow = img.style.filter = img.style.transform = '';
    document.getElementById('enemy-name-tag').textContent = next.name;
    sf = { s1: false, s2: false, img: false };
    img.classList.remove('dead');
    killingInProgress = false;
    updateUI();
  }, 800);
}

function showWinScreen() {
  playWinSound();
  document.getElementById('win-money').textContent =
    Math.floor(G.money).toLocaleString('ru-RU') + ' ₽ ЗАРАБОТАНО';
  const ws = document.getElementById('win-screen');
  ws.classList.add('show');
  spawnWinParticles();
}

function showKillBanner(name) {
  const b = document.getElementById('kill-banner');
  document.getElementById('banner-name').textContent = name;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 1600);
}

function spawnWinParticles() {
  const container = document.getElementById('win-particles');
  const colors = ['#00ffcc','#ff00aa','#fff','#ffee00'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      const size = 4 + Math.random() * 8;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const x = Math.random() * 100;
      const dur = 1.5 + Math.random() * 2;
      p.style.cssText = `
        position:absolute; left:${x}%; top:-10px;
        width:${size}px; height:${size}px;
        background:${color}; border-radius:${Math.random()>0.5?'50%':'2px'};
        animation:particle-fall ${dur}s ease-in forwards;
        opacity:0.9;
      `;
      container.appendChild(p);
      setTimeout(() => p.remove(), dur * 1000 + 100);
    }, i * 80);
  }
}

function spawnFloat(x, y, txt, big = false) {
  const f = document.createElement('div');
  f.className = 'float-num' + (big ? ' big' : '');
  f.textContent = txt;
  f.style.left = x + 'px';
  f.style.top  = y + 'px';
  f.style.marginLeft = ((Math.random() - 0.5) * 60) + 'px';
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 900);
}

let prevMoney = 0;
let renderShopThrottle = 0;
function updateUI() {
  const bal = document.getElementById('balance');
  bal.textContent = Math.floor(G.money).toLocaleString('ru-RU');
  if (G.money !== prevMoney) {
    bal.classList.add('bump');
    setTimeout(() => bal.classList.remove('bump'), 100);
    prevMoney = G.money;
  }
  const pct = Math.max(0, G.enemyValue / G.enemyMax * 100);
  const fill = document.getElementById('enemy-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('danger', pct < 25);
  document.getElementById('click-btn').style.setProperty('--progress', (100 - pct) + '%');
  document.getElementById('cur-hp').textContent = Math.max(0, Math.ceil(G.enemyValue)).toLocaleString('ru-RU');
  document.getElementById('max-hp').textContent = G.enemyMax.toLocaleString('ru-RU');
  document.getElementById('click-power-label').textContent = `+${G.clickPower} ЗА КЛИК`;
  let cps = Object.values(G.items).reduce((s, i) => s + i.count * i.inc, 0);
  document.getElementById('cps-badge').textContent = `${cps} ₽/с`;

  // Обновляем магазин не чаще раза в 200мс чтобы не ломать клики
  const now = Date.now();
  if (now - renderShopThrottle > 200) {
    renderShopThrottle = now;
    renderShop();
  }
}

function renderShop() {
  const container = document.getElementById('shop-container');
  const ids = Object.keys(G.items);

  // Строим карточки один раз
  if (container.children.length !== ids.length) {
    container.innerHTML = '';
    ids.forEach(id => {
      const item = G.items[id];
      const div = document.createElement('div');
      div.id = 'scard-' + id;
      div.className = 's-card cant-afford';
      // На мобиле используем touchend с preventDefault чтобы не срабатывало дважды (touch + click)
      if (MOB) {
        div.addEventListener('touchend', e => { e.preventDefault(); buyItem(id); }, { passive: false });
      } else {
        div.addEventListener('click', () => buyItem(id));
      }

      const priceStr = () => {
        const p = G.items[id].price;
        return p >= 1000000 ? (p/1000000).toFixed(1)+'М' : p >= 1000 ? Math.round(p/1000)+'К' : p;
      };

      div.innerHTML = `
        <div class="s-icon">${item.icon}</div>
        <div class="s-info">
          <div class="s-name">${item.name} <span class="s-count" style="color:rgba(0,255,204,0.4);font-size:0.48rem;">×0</span></div>
          <div class="s-desc">${item.desc}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="s-price price-tag">-- ₽</div>
          <div class="price-inc" style="color:rgba(255,0,170,0.6)">⚡+${item.clickBonus}/клик</div>
          <div class="price-inc">+${item.inc >= 1000 ? Math.round(item.inc/1000)+'К' : item.inc} ₽/с</div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  // Обновляем только динамические части
  ids.forEach(id => {
    const item = G.items[id];
    const div = document.getElementById('scard-' + id);
    if (!div) return;

    const afford = G.money >= item.price;
    div.classList.toggle('cant-afford', !afford);

    const priceStr = item.price >= 1000000
      ? (item.price/1000000).toFixed(1)+'М'
      : item.price >= 1000 ? Math.round(item.price/1000)+'К' : item.price;

    div.querySelector('.s-count').textContent = '×' + item.count;
    div.querySelector('.s-price').textContent = priceStr + ' ₽';
  });
}

function buyItem(id) {
  const item = G.items[id];
  if (G.money < item.price) return;
  G.money -= item.price;
  item.count++;
  item.price = Math.floor(item.price * 1.3);
  G.clickPower = 1 + Object.values(G.items).reduce((s, i) => s + i.count * (i.clickBonus || 0), 0);
  spawnFloat(window.innerWidth / 2, window.innerHeight * 0.65, `⚡ +${item.clickBonus} к клику!`, true);
  renderShopThrottle = 0;
  updateUI();
}

setInterval(() => {
  if (G.gameOver) return;
  const inc = Object.values(G.items).reduce((s, i) => s + i.count * i.inc, 0) + (G._jokeInc || 0);
  if (inc > 0) {
    const tick = inc / 10;
    G.money      += tick;
    G.enemyValue -= tick;
    checkSoundThresholds();
    if (G.enemyValue <= 0 && !killingInProgress) nextEnemy();
    updateUI();
  }
}, 100);

// ─── Анимированный фон ──────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const PCOUNT = MOB ? 20 : 70;
  const particles = Array.from({ length: PCOUNT }, () => ({
    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
    alpha: Math.random() * 0.5 + 0.1, pulse: Math.random() * Math.PI * 2,
  }));

  // Матрица только на десктопе (слишком тяжело для мобила)
  const COL_SIZE = 22;
  const cols = MOB ? [] : Array.from({ length: Math.ceil(window.innerWidth / COL_SIZE) }, (_, i) => ({
    x: i * COL_SIZE + 11, y: Math.random() * -600,
    speed: 0.4 + Math.random() * 0.8,
    chars: Array.from({ length: 20 }, () => Math.random() > 0.5
      ? String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96))
      : Math.floor(Math.random() * 10).toString()),
    alpha: 0.05 + Math.random() * 0.07,
    len: 8 + Math.floor(Math.random() * 10),
  }));

  let frame = 0;
  function animate() {
    frame++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!MOB) {
      ctx.font = '11px monospace';
      cols.forEach(col => {
        col.y += col.speed;
        if (col.y > canvas.height + col.len * 11) { col.y = -col.len * 16; col.speed = 0.4 + Math.random() * 0.8; }
        if (Math.random() < 0.015) {
          const idx = Math.floor(Math.random() * col.chars.length);
          col.chars[idx] = Math.random() > 0.5 ? String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96)) : Math.floor(Math.random() * 10).toString();
        }
        for (let k = 0; k < col.len; k++) {
          const ky = col.y - k * 11;
          if (ky < 0 || ky > canvas.height) continue;
          const fade = 1 - k / col.len;
          ctx.fillStyle = k === 0 ? `rgba(200,255,240,${col.alpha * 4 * fade})` : `rgba(0,255,204,${col.alpha * fade})`;
          ctx.fillText(col.chars[k % col.chars.length], col.x, ky);
        }
      });

      // Связи O(n²) — только на десктопе
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 120) {
            ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0,255,204,${(1 - dist/120) * 0.06})`; ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      }
    }

    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.pulse += 0.03;
      if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,255,204,${p.alpha * (0.6 + 0.4 * Math.sin(p.pulse))})`; ctx.fill();
    });

    if (!MOB) {
      const lineY = (frame * 0.5) % canvas.height;
      const grad = ctx.createLinearGradient(0, lineY, canvas.width, lineY);
      grad.addColorStop(0,'transparent'); grad.addColorStop(0.4,'rgba(0,255,204,0.04)');
      grad.addColorStop(0.6,'rgba(0,255,204,0.04)'); grad.addColorStop(1,'transparent');
      ctx.fillStyle = grad; ctx.fillRect(0, lineY, canvas.width, 1);
    }

    requestAnimationFrame(animate);
  }
  animate();
})();

// ─── Кликабельные объекты на фоне ──────────────────────────────────
const BG_OBJECTS = [
  { icon:'💰', label:'+50 ₽',        color:'#ffd700', rare:false, bonus:{ type:'money', val:50  } },
  { icon:'💰', label:'+100 ₽',       color:'#ffd700', rare:false, bonus:{ type:'money', val:100 } },
  { icon:'💎', label:'+500 ₽',       color:'#00eeff', rare:false, bonus:{ type:'money', val:500 } },
  { icon:'💎', label:'+300 ₽',       color:'#00eeff', rare:false, bonus:{ type:'money', val:300 } },
  { icon:'⚡',  label:'+5 клик/10с', color:'#ffee00', rare:false, bonus:{ type:'click', val:5,  dur:10 } },
  { icon:'⚡',  label:'+10 клик/8с', color:'#ffee00', rare:false, bonus:{ type:'click', val:10, dur:8  } },
  { icon:'🔋', label:'+20₽/с 15с',   color:'#00ffcc', rare:false, bonus:{ type:'cps',   val:20, dur:15 } },
  { icon:'🔋', label:'+50₽/с 10с',   color:'#00ffcc', rare:false, bonus:{ type:'cps',   val:50, dur:10 } },
  { icon:'📦', label:'+200 ₽',       color:'#ff8c00', rare:false, bonus:{ type:'money', val:200 } },
  { icon:'🎰', label:'ДЖЕКПОТ!',     color:'#ff00aa', rare:true,  bonus:{ type:'money', val:1000} },
  { icon:'🚀', label:'+15 клик/12с', color:'#ff00aa', rare:true,  bonus:{ type:'click', val:15, dur:12 } },
  { icon:'👑', label:'+1000 ₽',      color:'#ffd700', rare:true,  bonus:{ type:'money', val:1000} },
  { icon:'🏆', label:'+200₽/с 8с',   color:'#ffd700', rare:true,  bonus:{ type:'cps',   val:200,dur:8  } },
  { icon:'💵', label:'+75 ₽',        color:'#7fff00', rare:false, bonus:{ type:'money', val:75  } },
  { icon:'🪙', label:'+25 ₽',        color:'#ffd700', rare:false, bonus:{ type:'money', val:25  } },
];

let activeObjs = [];
let objSpawnTimer = null;

function getSpawnZone() {
  // Спавним только в левой и правой полосах, не перекрывая центр
  const statusH = 60;
  const shopH   = 175;
  const usableH = window.innerHeight - statusH - shopH - 20;
  const side    = Math.random() < 0.5 ? 'left' : 'right';
  const zoneW   = Math.min(window.innerWidth * 0.22, 130);
  let x;
  if (side === 'left') {
    x = 10 + Math.random() * (zoneW - 50);
  } else {
    x = window.innerWidth - 60 - Math.random() * (zoneW - 50);
  }
  const y = statusH + 10 + Math.random() * (usableH - 60);
  return { x, y };
}

function spawnBgObject() {
  if (G.gameOver || MOB) return;
  if (activeObjs.length >= 4) { scheduleObj(); return; }

  // Редкие объекты появляются реже
  const pool = Math.random() < 0.15
    ? BG_OBJECTS.filter(o => o.rare)
    : BG_OBJECTS.filter(o => !o.rare);
  const def = pool[Math.floor(Math.random() * pool.length)];
  const pos = getSpawnZone();

  const el = document.createElement('div');
  el.className = 'bg-object' + (def.rare ? ' rare' : '');
  el.innerHTML = `<span class="bg-object-icon">${def.icon}</span><span class="bg-object-label" style="color:${def.color}">${def.label}</span>`;
  el.style.left = pos.x + 'px';
  el.style.top  = pos.y + 'px';
  el.style.color = def.color;
  document.body.appendChild(el);
  activeObjs.push(el);

  // Таймаут исчезновения: 6–10 сек
  const lifetime = 6000 + Math.random() * 4000;
  el.style.animation = `obj-appear 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards, obj-timeout ${lifetime/1000}s ease forwards`;

  const autoRemove = setTimeout(() => removeBgObj(el), lifetime);
  el._ar = autoRemove;

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    clearTimeout(el._ar);
    applyObjBonus(def.bonus, e.clientX, e.clientY);
    el.classList.add('collected');
    setTimeout(() => removeBgObj(el), 380);
  });

  scheduleObj();
}

function removeBgObj(el) {
  activeObjs = activeObjs.filter(o => o !== el);
  el.remove();
}

function scheduleObj() {
  clearTimeout(objSpawnTimer);
  const delay = 2500 + Math.random() * 4000; // 2.5–6.5 сек
  objSpawnTimer = setTimeout(spawnBgObject, delay);
}

function applyObjBonus(bonus, cx, cy) {
  if (bonus.type === 'money') {
    G.money += bonus.val;
    spawnFloat(cx, cy, `+${bonus.val} ₽`, true);
    updateUI();
  } else if (bonus.type === 'click') {
    G.clickPower += bonus.val;
    spawnFloat(cx, cy, `⚡ +${bonus.val} КЛИК!`, true);
    updateUI();
    setTimeout(() => { G.clickPower -= bonus.val; updateUI(); }, bonus.dur * 1000);
  } else if (bonus.type === 'cps') {
    G._jokeInc = (G._jokeInc || 0) + bonus.val;
    spawnFloat(cx, cy, `📈 +${bonus.val}₽/с`, true);
    setTimeout(() => { G._jokeInc = Math.max(0, (G._jokeInc || 0) - bonus.val); }, bonus.dur * 1000);
  }
}

// Первый спавн через 2 сек
setTimeout(spawnBgObject, 2000);

updateUI();
</script>
